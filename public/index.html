<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>たけるとにんケット</title>
    <link rel="stylesheet" href="/styles.css?v=20260610-save-button" />
  </head>
  <body>
    <main class="app-shell">
      <header class="hero">
        <div class="hero-copy">
          <p class="eyebrow">AI photo magic</p>
          <h1>たけるとにんケット</h1>
          <p class="lead">
            たけるとにんケットに行った気分になれるAI画像加工アプリだよ。撮った写真をアップロードして生成ボタンをポチッとしてみて。
          </p>
        </div>
        <div class="hero-image-wrap" aria-hidden="true">
          <img src="/api/reference/hero?v=20260610-reference-refresh" alt="" />
        </div>
      </header>

      <section class="workspace">
        <form class="control-panel" id="generateForm">
          <div class="section-title">
            <span>1</span>
            <h2>写真をアップロード</h2>
          </div>

          <div class="upload-grid">
            <label class="drop-zone" data-kind="base">
              <input id="basePhoto" type="file" accept="image/png,image/jpeg,image/webp" />
              <span class="drop-title">ここをタップして写真を選んでね</span>
              <img id="basePreview" alt="" />
            </label>
          </div>

          <div class="section-title">
            <span>2</span>
            <h2>お面で顔を隠す（オプション）</h2>
          </div>

          <label class="toggle-row">
            <input id="maskFaces" type="checkbox" />
            <span class="toggle-track"></span>
            <span>
              <strong>オロチのお面</strong>
              <small>写真に写っている人の顔を、相棒のオロチモチーフのお面で隠せます。</small>
            </span>
            <span class="mask-state">
              <span class="state-off">OFF</span>
              <span class="state-on">ON</span>
            </span>
          </label>

          <button class="generate-button" id="generateButton" type="submit">
            <span>画像を生成する</span>
          </button>
        </form>

        <section class="result-panel" aria-live="polite">
          <div class="result-empty" id="emptyState">
            <div class="phone-frame">
              <div class="photo-placeholder"></div>
            </div>
            <p>生成結果がここに表示されます。</p>
          </div>

          <div class="result-ready hidden" id="resultState">
            <img id="resultImage" alt="生成された写真" />
            <div class="result-actions">
              <button id="saveToPhotos" class="save-photo-button" type="button">まずは画像をダウンロード</button>
              <button id="postToX" class="x-post-button" type="button">#たけるとにんケット でポスト</button>
            </div>
          </div>

          <div class="result-loading hidden" id="loadingState">
            <div class="spinner"></div>
            <p>たけるくんが頑張ってにんケットに向かっています。応援しながら、しばらくお待ちください。</p>
          </div>

          <div class="error-box hidden" id="errorBox"></div>
        </section>
      </section>

      <footer class="fan-site-footer">
        <p class="support-note">
          不具合やわからないことは、<a href="https://x.com/awoahiru" target="_blank" rel="noopener noreferrer">アヲPくん</a>に聞いてね。
        </p>
        <a
          class="fan-site-banner"
          href="https://tomoepapa.github.io/orochi-fan-site/"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="オロチファンサイトを別ウィンドウで開く"
        >
          <img src="/api/reference/banner?v=20260610-reference-refresh" alt="オロチファンサイト" />
        </a>
      </footer>
    </main>

    <script src="/app.js?v=20260611-fan-site-window-safe" type="module"></script>
  </body>
</html>
